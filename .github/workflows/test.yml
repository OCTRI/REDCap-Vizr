name: Test
on:
  push:
    branches:
    - '**'
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        node-version: 24.x
    - run: npm install
    - run: npm run build
    - run: npm run test-ci
